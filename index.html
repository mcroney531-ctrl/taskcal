<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Finlandica:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #F2F5FC; font-family: 'Finlandica', Georgia, serif; min-height: 100vh; padding-top: env(safe-area-inset-top, 32px); }
  @keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideInRight { from { opacity:0; transform:translateX(32px); } to { opacity:1; transform:translateX(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .task-card { transition: box-shadow 0.12s, transform 0.1s, opacity 0.15s; }
  .pill-btn:active { transform: translateY(2px) scale(0.97); }
  .nav-btn:active { transform: scale(0.92); }
  input { font-family: 'Finlandica', Georgia, serif; }
  button { font-family: 'Finlandica', Georgia, serif; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #1B3A6B55; border-radius: 2px; }
  .drag-handle { cursor: grab; user-select: none; touch-action: none; -webkit-user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  @keyframes slideInLeft { from { opacity:0; transform:translateX(-100%); } to { opacity:1; transform:translateX(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const NAVY = "#1B3A6B";
const NAVY2 = "#2A5298";
const BG = "#F2F5FC";
const PALETTE = ["#E85D4A","#F4A261","#2A9D8F","#457B9D","#9B5DE5","#F15BB5","#00BBF9","#FFBE0B"];
const DEFAULT_CATEGORIES = [
  { id:"build", title:"Build/Project", color:"#457B9D" },
  { id:"cleaning", title:"Cleaning", color:"#2A9D8F" },
  { id:"custom", title:"Custom", color:"#9B5DE5" },
  { id:"finance", title:"Finance", color:"#FFBE0B" },
  { id:"housework", title:"Housework", color:"#F4A261" },
  { id:"work", title:"Work", color:"#1B3A6B" },
];
const CATEGORY_ICON_MAP = {
  build:["🔨","⚙️","🏗️","💻","🛠️","🎯"],
  cleaning:["🧹","🧽","🫧","🪣","✨","🧴"],
  custom:["🌟","💎","🎨","✨","🔑","🎭"],
  finance:["💰","💳","📊","🏦","💵","📈"],
  housework:["🏠","🛒","🍳","🌿","🪴","🧺"],
  work:["💼","📋","📧","🤝","📊","🖥️"],
};
const CARD_SHADOW = () => `0 6px 0 rgba(0,0,0,0.18), 0 10px 24px rgba(0,0,0,0.10)`;
const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const DAY_SHORT = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const fmt = (date) => {
  const y=date.getFullYear(), m=String(date.getMonth()+1).padStart(2,'0'), d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
};
const todayStr = () => fmt(new Date());
const parseDate = (str) => { const [y,m,d]=str.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (date,n) => { const d=new Date(date); d.setDate(d.getDate()+n); return d; };
const getWeekStart = (date) => {
  const d=new Date(date), day=d.getDay();
  // Sunday-start: subtract day-of-week to get to Sunday
  d.setDate(d.getDate()-day);
  d.setHours(0,0,0,0); return d;
};
const getGreeting = () => {
  const h=new Date().getHours();
  if(h<12) return {text:"Good morning",icon:"☀️"};
  if(h<17) return {text:"Good afternoon",icon:"🌤️"};
  return {text:"Good evening",icon:"🌙"};
};
const getAutoIcon = (title, categoryId) => {
  if(categoryId && CATEGORY_ICON_MAP[categoryId]){
    const icons=CATEGORY_ICON_MAP[categoryId];
    return icons[Math.floor(Math.abs((title||"").charCodeAt(0)||0))%icons.length];
  }
  const t=(title||"").toLowerCase();
  if(/meet|call|zoom|teams|standup|sync|chat/.test(t)) return "🤝";
  if(/email|mail|send|message|text/.test(t)) return "📧";
  if(/lunch|dinner|breakfast|eat|food|coffee|restaurant/.test(t)) return "🍽️";
  if(/workout|gym|run|exercise|walk|yoga|training/.test(t)) return "💪";
  if(/doctor|dentist|medical|health|appointment|therapy/.test(t)) return "🏥";
  if(/pay|bill|invoice|budget|money|bank|finance/.test(t)) return "💰";
  if(/read|book|study|learn|course|research/.test(t)) return "📚";
  if(/write|draft|blog|post|article|report|essay/.test(t)) return "✍️";
  if(/review|check|feedback|edit|proofread/.test(t)) return "🔍";
  if(/buy|shop|order|purchase|grocery/.test(t)) return "🛒";
  if(/travel|flight|trip|hotel|pack/.test(t)) return "✈️";
  if(/birthday|party|celebrate|event|wedding/.test(t)) return "🎉";
  if(/fix|repair|bug|issue|problem|debug/.test(t)) return "🔧";
  if(/design|create|build|make|develop/.test(t)) return "🎨";
  if(/present|pitch|demo|show|slide/.test(t)) return "📊";
  if(/plan|strategy|roadmap|outline/.test(t)) return "🗺️";
  if(/clean|organize|sort|tidy/.test(t)) return "🧹";
  if(/urgent|asap|priority|important|deadline/.test(t)) return "🔥";
  if(/idea|brainstorm|think|concept/.test(t)) return "💡";
  if(/follow|remind|check.in/.test(t)) return "🔔";
  if(/interview|hire|recruit/.test(t)) return "👔";
  if(/video|record|edit|film/.test(t)) return "🎬";
  if(/music|practice|rehearse|play/.test(t)) return "🎵";
  if(/ai|prompt|claude|gpt|model/.test(t)) return "🤖";
  const defaults=["📌","🎯","⚡","🌟","✅","🚀","💎","🔑"];
  return defaults[Math.floor(Math.abs((title||"x").charCodeAt(0)+(title||"").length))%defaults.length];
};

// ── localStorage ─────────────────────────────────────────────────────
const fbSave=(t)=>{try{localStorage.setItem('taskcal-tasks',JSON.stringify(t||[]));}catch(e){}};
const fbLoad=async()=>{try{const r=localStorage.getItem('taskcal-tasks');if(r)return JSON.parse(r);}catch(e){}return null;};
const fbSaveCats=(c)=>{try{localStorage.setItem('taskcal-categories',JSON.stringify(c));}catch(e){}};
const fbLoadCats=async()=>{try{const r=localStorage.getItem('taskcal-categories');if(r)return JSON.parse(r);}catch(e){}return null;};
const fbSaveLists=(l)=>{try{localStorage.setItem('taskcal-lists',JSON.stringify(l||[]));}catch(e){}};
const fbLoadLists=async()=>{try{const r=localStorage.getItem('taskcal-lists');if(r)return JSON.parse(r);}catch(e){}return null;};
const fbSaveDayOrder=(o)=>{try{localStorage.setItem('taskcal-dayorder',JSON.stringify(o));}catch(e){}};
const fbLoadDayOrder=async()=>{try{const r=localStorage.getItem('taskcal-dayorder');if(r)return JSON.parse(r);}catch(e){}return{};};
const fbSaveSubtasks=(m)=>{try{localStorage.setItem('taskcal-subtasks',JSON.stringify(m));}catch(e){}};
const fbLoadSubtasks=async()=>{try{const r=localStorage.getItem('taskcal-subtasks');if(r)return JSON.parse(r);}catch(e){}return{};};

// ─── ROUTINE DETAIL SHEET ────────────────────────────────────────────
function RoutineSheet({ task, subtasks, onClose, onSaveSubtasks }) {
  const [items, setItems] = React.useState(subtasks || []);
  const [newText, setNewText] = React.useState("");
  const [editingId, setEditingId] = React.useState(null);
  const [editText, setEditText] = React.useState("");
  const doneCount = items.filter(i=>i.checked).length;
  const pct = items.length ? Math.round((doneCount/items.length)*100) : 0;

  const addItem = () => {
    if(!newText.trim()) return;
    const updated=[...items,{id:Date.now().toString(),text:newText.trim(),checked:false}];
    setItems(updated); onSaveSubtasks(task.id,updated); setNewText("");
  };
  const toggle = (id) => {
    if(editingId===id) return; // don't toggle while editing
    const updated=items.map(it=>it.id===id?{...it,checked:!it.checked}:it);
    setItems(updated); onSaveSubtasks(task.id,updated);
  };
  const deleteItem = (id) => {
    const updated=items.filter(it=>it.id!==id);
    setItems(updated); onSaveSubtasks(task.id,updated);
    if(editingId===id) setEditingId(null);
  };
  const startEdit = (item) => {
    setEditingId(item.id);
    setEditText(item.text);
  };
  const commitEdit = (id) => {
    const trimmed = editText.trim();
    if(trimmed) {
      const updated=items.map(it=>it.id===id?{...it,text:trimmed}:it);
      setItems(updated); onSaveSubtasks(task.id,updated);
    }
    setEditingId(null);
  };
  const cancelEdit = () => setEditingId(null);

  return (
    <div style={{position:"fixed",inset:0,zIndex:400,background:BG,display:"flex",flexDirection:"column",animation:"slideInRight 0.22s ease"}}>
      <div style={{background:`linear-gradient(135deg,${task.color}EE,${task.color}BB)`,padding:"20px 20px 22px",paddingTop:"max(20px,env(safe-area-inset-top,20px))",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"55%",background:"linear-gradient(180deg,rgba(255,255,255,0.18) 0%,transparent 100%)",pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <button onClick={onClose} style={{background:"rgba(0,0,0,0.15)",border:"none",borderRadius:"50%",color:"#fff",width:"34px",height:"34px",cursor:"pointer",fontSize:"18px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,backdropFilter:"blur(4px)"}}>‹</button>
          <div style={{fontSize:"26px",lineHeight:1,filter:"drop-shadow(0 2px 4px rgba(0,0,0,0.15))",flexShrink:0}}>{task.icon||"📌"}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:"8px",fontWeight:"800",color:"rgba(255,255,255,0.6)",letterSpacing:"0.18em",marginBottom:"3px"}}>🔁 ROUTINE</div>
            <div style={{fontSize:"20px",fontWeight:"700",color:"#fff",lineHeight:1.2,textShadow:"0 1px 4px rgba(0,0,0,0.2)"}}>{task.title}</div>
          </div>
        </div>
        {items.length>0&&(
          <div style={{marginTop:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
              <span style={{fontSize:"11px",color:"rgba(255,255,255,0.7)",fontWeight:"600"}}>{doneCount}/{items.length} steps done</span>
              <span style={{fontSize:"11px",color:"rgba(255,255,255,0.9)",fontWeight:"700"}}>{pct}%</span>
            </div>
            <div style={{background:"rgba(0,0,0,0.18)",borderRadius:"8px",height:"6px",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:"rgba(255,255,255,0.85)",borderRadius:"8px",transition:"width 0.3s ease"}}/>
            </div>
          </div>
        )}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"20px 18px 24px"}}>
        {items.length===0&&(
          <div style={{textAlign:"center",padding:"48px 20px",animation:"fadeIn 0.3s ease"}}>
            <div style={{fontSize:"40px",marginBottom:"10px"}}>🪜</div>
            <div style={{fontSize:"15px",color:"#AAB8D0",fontWeight:"500"}}>No steps yet</div>
            <div style={{fontSize:"12px",color:"#C5D0E0",marginTop:"4px"}}>Add the steps that make up this routine</div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
          {items.map((item)=>(
            <div key={item.id} style={{background:"#fff",borderRadius:"14px",padding:"11px 14px",boxShadow:"0 2px 8px rgba(27,58,107,0.07)",border:`1.5px solid ${editingId===item.id?"#C8D4E8":"#E8EEF8"}`,transition:"border-color 0.15s"}}>
              {editingId===item.id ? (
                /* ── Edit mode ── */
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <input
                    value={editText}
                    onChange={e=>setEditText(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter") commitEdit(item.id); if(e.key==="Escape") cancelEdit(); }}
                    autoFocus
                    style={{flex:1,background:"#F4F7FF",border:"2px solid #C8D4E8",borderRadius:"10px",padding:"7px 11px",color:"#1A1A1A",fontSize:"15px",fontFamily:"inherit",outline:"none"}}
                  />
                  <button onClick={()=>commitEdit(item.id)} style={{background:`linear-gradient(135deg,${task.color}DD,${task.color}AA)`,border:"none",borderRadius:"10px",color:"#fff",padding:"7px 12px",cursor:"pointer",fontSize:"13px",fontWeight:"700",fontFamily:"inherit",whiteSpace:"nowrap"}}>Save</button>
                  <button onClick={cancelEdit} style={{background:"none",border:"none",color:"#AAB8D0",cursor:"pointer",fontSize:"15px",padding:"4px",fontFamily:"inherit"}}>✕</button>
                </div>
              ) : (
                /* ── Normal mode ── */
                <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                  <button onClick={()=>toggle(item.id)} style={{
                    width:"28px",height:"28px",borderRadius:"50%",flexShrink:0,cursor:"pointer",
                    background:item.checked?`linear-gradient(135deg,${task.color}DD,${task.color}AA)`:"#fff",
                    border:item.checked?"none":"2px solid #C8D4E8",
                    color:"#fff",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",
                    boxShadow:item.checked?`0 2px 8px ${task.color}55`:"none",transition:"all 0.18s"
                  }}>{item.checked?"✓":""}</button>
                  <span style={{flex:1,fontSize:"15px",color:item.checked?"#B0BCCE":"#2A3A5A",fontWeight:"500",textDecoration:item.checked?"line-through":"none",lineHeight:1.35,wordBreak:"break-word"}}>{item.text}</span>
                  <button onClick={()=>startEdit(item)} style={{background:"none",border:"none",color:"#C8D4E8",cursor:"pointer",fontSize:"13px",padding:"4px 2px 4px 6px",flexShrink:0,lineHeight:1}}>✏️</button>
                  <button onClick={()=>deleteItem(item.id)} style={{background:"none",border:"none",color:"#D8E0EE",cursor:"pointer",fontSize:"16px",padding:"4px 2px",flexShrink:0,lineHeight:1}}>✕</button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:"12px 18px",paddingBottom:"max(20px,env(safe-area-inset-bottom,20px))",background:"rgba(242,245,252,0.97)",borderTop:"1.5px solid #E8EEF8",backdropFilter:"blur(8px)"}}>
        <div style={{display:"flex",gap:"10px"}}>
          <input value={newText} onChange={e=>setNewText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="Add a step..."
            style={{flex:1,background:"#fff",border:"2px solid #E0E8FF",borderRadius:"14px",padding:"12px 16px",color:"#1A1A1A",fontSize:"15px",fontFamily:"inherit",outline:"none",boxShadow:"0 2px 8px rgba(27,58,107,0.06)"}}/>
          <button onClick={addItem} style={{background:`linear-gradient(135deg,${task.color}EE,${task.color}BB)`,border:"none",borderRadius:"14px",color:"#fff",padding:"12px 20px",cursor:"pointer",fontSize:"14px",fontWeight:"700",fontFamily:"inherit",boxShadow:`0 4px 0 rgba(0,0,0,0.15),0 6px 14px ${task.color}44`}}>＋</button>
        </div>
      </div>
    </div>
  );
}

// ─── ROUTINES PANEL ──────────────────────────────────────────────────
function RoutinesPanel({ dailyTasks, subtasksMap, onClose, onOpenRoutine }) {
  return (
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
      style={{position:"fixed",inset:0,background:"rgba(10,20,50,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:250,backdropFilter:"blur(6px)",animation:"fadeIn 0.2s ease"}}>
      <div style={{background:"#fff",borderRadius:"24px 24px 0 0",padding:"24px 22px 40px",width:"100%",maxWidth:"480px",boxShadow:"0 -20px 60px rgba(27,58,107,0.25)",animation:"slideUp 0.25s ease",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
        <div style={{width:"40px",height:"4px",background:"#E0E6F0",borderRadius:"2px",margin:"0 auto 20px"}}/>
        <div style={{fontSize:"15px",color:NAVY,fontWeight:"700",marginBottom:"3px"}}>🔁 Routines</div>
        <div style={{fontSize:"12px",color:"#AAB8D0",marginBottom:"18px"}}>Daily tasks — tap to manage steps</div>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px"}}>
          {dailyTasks.length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px"}}>
              <div style={{fontSize:"36px",marginBottom:"10px"}}>🔁</div>
              <div style={{fontSize:"14px",color:"#AAB8D0",fontWeight:"500"}}>No daily tasks yet</div>
              <div style={{fontSize:"12px",color:"#C5D0E0",marginTop:"4px"}}>Mark a task as Daily to see it here</div>
            </div>
          )}
          {dailyTasks.map(task=>{
            const subs=subtasksMap[task.id]||[];
            const done=subs.filter(s=>s.checked).length;
            return(
              <button key={task.id} onClick={()=>{onClose();onOpenRoutine(task);}}
                style={{display:"flex",alignItems:"center",gap:"14px",background:"#F4F7FF",border:"2px solid #E0E8FF",borderRadius:"16px",padding:"14px 16px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",transition:"all 0.12s"}}>
                <div style={{width:"44px",height:"44px",borderRadius:"14px",background:`linear-gradient(135deg,${task.color}EE,${task.color}AA)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px",flexShrink:0,boxShadow:`0 3px 8px ${task.color}44`}}>
                  {task.icon||"📌"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",color:NAVY,fontWeight:"700",marginBottom:"3px"}}>{task.title}</div>
                  <div style={{fontSize:"11px",color:"#AAB8D0"}}>{subs.length===0?"No steps — tap to add":`${done}/${subs.length} steps`}</div>
                </div>
                <div style={{fontSize:"18px",color:"#C8D4E8"}}>›</div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── DAY TASK CARD ───────────────────────────────────────────────────
function DayTaskCard({ task, onDone, onDelete, onEdit, onOpenRoutine, index, dateStr, isCompleted, categories, isDragging, dragOver, onPointerDown, subtasks }) {
  const isDaily = task.recurrence === 'daily';
  const subCount = subtasks ? subtasks.length : 0;
  const subDone = subtasks ? subtasks.filter(s=>s.checked).length : 0;

  const handleCardClick = (e) => {
    if(isDaily && e.target.closest('button')===null && e.target.closest('[data-draghandle]')===null) {
      onOpenRoutine(task);
    }
  };

  return (
    <div onClick={handleCardClick} className="task-card" style={{
      background: isDragging?`linear-gradient(135deg,${task.color}99,${task.color}77)`:`linear-gradient(135deg,${task.color}EE,${task.color}CC)`,
      borderRadius:"16px", padding:"16px 18px 14px",
      boxShadow: isDragging?`0 18px 48px rgba(0,0,0,0.32)`:(dragOver?`0 0 0 3px ${NAVY}77, ${CARD_SHADOW()}`:CARD_SHADOW()),
      opacity: isDragging?0.45:(isCompleted?0.45:1),
      position:"relative", overflow:"hidden",
      border: isDaily?"3px solid rgba(0,0,0,0.35)":(task.categoryId?"3px solid rgba(0,0,0,0.2)":"3px solid transparent"),
      paddingTop:(isDaily||task.categoryId)?"24px":"16px",
      transform: isDragging?"scale(1.03) rotate(1.5deg)":(dragOver?"scale(1.015)":"none"),
      cursor: isDaily?"pointer":"default",
      zIndex: isDragging?50:1,
    }}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"50%",background:"linear-gradient(180deg,rgba(255,255,255,0.2) 0%,transparent 100%)",borderRadius:"16px 16px 0 0",pointerEvents:"none"}}/>
      {(isDaily||task.categoryId)&&(()=>{
        const cat=task.categoryId?(categories||[]).find(c=>c.id===task.categoryId):null;
        const catTitle=cat?cat.title.toUpperCase():null;
        let label="";
        if(isDaily&&c
